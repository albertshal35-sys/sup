name = "lienwolf-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Daily ingestion, weekdays only, 11:00 UTC (pre-market US)
[triggers]
crons = ["0 11 * * 1-5"]

# Single deploy: the Worker serves the built frontend as static assets and
# handles /api/* itself. SPA fallback keeps client-side view routing working.
[assets]
directory = "../dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "lienwolf-db"
database_id = "67867b42-9149-4509-9b09-c24ad087f1c6"

[vars]
# CORS origin of the Pages frontend
ALLOWED_ORIGIN = "*"

# Secrets (set via `wrangler secret put <NAME> --config worker/wrangler.toml`):
#   ADMIN_TOKEN         - bearer for /api/admin/* + KEK for stored vendor keys
#   WEBHOOK_SECRET      - HMAC secret for inbound record webhooks
#   COUNTY_API_KEY      - fallback county recorder key (UI-managed keys preferred)
#   PERMIT_API_KEY      - fallback permit aggregator key
#   SKIP_TRACE_API_KEY  - fallback skip-trace key
