name = "lienwolf"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Twice-daily sweeps (11:00 & 23:00 UTC, every day — recorders publish on
# weekends too) seed the pull queue; the 10-minute tick drains a bounded
# slice per invocation (free-tier subrequest safety) and advances running
# historical backfills whenever no pulls are pending.
[triggers]
crons = ["0 11 * * *", "0 23 * * *", "*/10 * * * *"]

# Single deploy: the Worker serves the built frontend as static assets and
# handles /api/* itself. SPA fallback keeps client-side view routing working.
[assets]
directory = "../dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "lienwolf-db"
database_id = "67867b42-9149-4509-9b09-c24ad087f1c6"

# Workers AI (analysis/enrichment through AI Gateway for centralized billing;
# set the gateway id in Settings → AI pipeline)
[ai]
binding = "AI"

[vars]
ALLOWED_ORIGIN = "*"
AI_MODEL = "@cf/moonshotai/kimi-k2.6"
# CLOUDFLARE_ACCOUNT_ID is injected automatically by the deploy workflow
# (--var from the CLOUDFLARE_ACCOUNT_ID GitHub secret) — used by Browser
# Rendering (headless scraping). Only set it here for manual deploys.

# Secrets (the deploy workflow syncs CLOUDFLARE_API_TOKEN automatically from
# the same-named GitHub secret; set the rest via
# `wrangler secret put <NAME> --config worker/wrangler.toml`):
#   ACCESS_CODE           - login code that unlocks the app; also the KEK for stored vendor keys
#   CLOUDFLARE_API_TOKEN  - same token as CI; give it Browser Rendering: Edit for scraping
#   RESEND_API_KEY        - email digests
#   WEBHOOK_SECRET        - HMAC secret for inbound record webhooks
#   COUNTY_API_KEY / PERMIT_API_KEY / SKIP_TRACE_API_KEY - optional env fallbacks for vendor keys
