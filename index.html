<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f5f6" />
    <meta
      name="description"
      content="LienWolf — borrower-intent intelligence for private & hard money lenders."
    />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- Apple home screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="LienWolf" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="manifest" href="/site.webmanifest" />

    <!-- Link previews (Open Graph / Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LienWolf" />
    <meta property="og:title" content="LienWolf — Lender Intelligence" />
    <meta
      property="og:description"
      content="Borrower-intent intelligence for private & hard money lenders. Maturity, cash-poor, permit and lien signals — one command center."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LienWolf — Lender Intelligence" />
    <meta
      name="twitter:description"
      content="Borrower-intent intelligence for private & hard money lenders."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <script>
      // Pre-paint theme stamp: read the persisted UI store to avoid a flash.
      try {
        var s = JSON.parse(localStorage.getItem("lienwolf-ui") || "{}");
        var t = (s.state && s.state.theme) || "light";
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Schibsted+Grotesk:wght@400..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    />
    <title>LienWolf — Lender Intelligence</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
